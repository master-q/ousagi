# ---- 基本 ----
input_tab_size      = 4
output_tab_size     = 4
indent_columns      = 4
indent_with_tabs    = 0

# ---- 空白 ----
sp_arith            = add
sp_assign           = add
sp_compare          = add
sp_bool             = add

# ---- 括弧 ----
sp_before_sparen    = add
sp_inside_sparen    = remove
sp_inside_fparen    = remove

# ---- インデント ----
indent_class        = true
indent_namespace    = true
indent_switch_case  = 4

# ---- 改行 ----
nl_after_semicolon  = true
nl_after_return     = true
nl_max              = 2

# ---- コメント ----
cmt_indent_multi    = true

# ---- 危険機能オフ ----
align_with_tabs     = false
align_on_tabstop    = false

# ---- 0.78系で使えるbrace系（限定的）----
nl_if_brace         = add
nl_for_brace        = add
nl_while_brace      = add
